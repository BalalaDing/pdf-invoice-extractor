<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Invoice Extractor</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<style>
  #uploadZone.dragover { border-color: #6366f1; background: #eef2ff; }
  .status-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
</style>
</head>
<body class="bg-gray-50 min-h-screen p-6">
<div class="max-w-7xl mx-auto">

  <div class="mb-8 text-center">
    <h1 class="text-3xl font-bold text-gray-800 mb-1">📄 PDF Invoice Extractor</h1>
    <p class="text-gray-500 text-sm">Upload PDF invoices to automatically extract and organize key information into a table</p>
  </div>

  <!-- Upload Zone (drag & drop + click) -->
  <div id="uploadZone" onclick="document.getElementById('fileInput').click()" class="border-2 border-dashed border-gray-300 rounded-2xl bg-white p-10 text-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-50 transition-all mb-6">
    <div class="text-5xl mb-3">📂</div>
    <p class="text-gray-600 font-medium">Drag & drop PDF files here, or click to select</p>
    <p class="text-gray-400 text-sm mt-1">Multiple PDFs supported</p>
    <input type="file" id="fileInput" multiple accept=".pdf" class="hidden">
    <button type="button" onclick="event.stopPropagation(); document.getElementById('fileInput').click()" class="mt-4 px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Select Files</button>
  </div>

  <!-- Progress -->
  <div id="progressArea" class="hidden mb-6 space-y-2"></div>

  <!-- Controls -->
  <div id="controls" class="hidden flex gap-3 mb-6">
    <button onclick="exportCSV()" class="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition text-sm font-medium">⬇️ Export CSV</button>
    <button onclick="clearAll()" class="px-5 py-2 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition text-sm font-medium">🗑️ Clear All</button>
  </div>

  <!-- Results Table -->
  <div id="resultsArea" class="hidden bg-white rounded-2xl shadow overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
      <h2 class="text-lg font-semibold text-gray-700">📊 Extracted Results</h2>
      <span id="resultCount" class="text-sm text-gray-400"></span>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
          <tr>
            <th class="px-4 py-3 text-left">File</th>
            <th class="px-4 py-3 text-left">Plant</th>
            <th class="px-4 py-3 text-left">Date</th>
            <th class="px-4 py-3 text-left">ID</th>
            <th class="px-4 py-3 text-left">Description</th>
            <th class="px-4 py-3 text-right">Unit Price</th>
            <th class="px-4 py-3 text-center">Qty</th>
            <th class="px-4 py-3 text-right">Line Total</th>
            <th class="px-4 py-3 text-center">Currency</th>
          </tr>
        </thead>
        <tbody id="tableBody" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>
  </div>

  <!-- Raw text debug -->
  <div id="debugArea" class="mt-4 space-y-3"></div>

</div>

<script>
let allRows = [];

const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');
fileInput.addEventListener('change', e => handleFiles(e.target.files));

// Drag & drop (click-to-select remains as fallback)
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

function handleFiles(files) {
  const pdfs = Array.from(files).filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
  if (!pdfs.length) return alert('Please select PDF files.');
  document.getElementById('progressArea').classList.remove('hidden');
  pdfs.forEach(processFile);
}

async function processFile(file) {
  const area = document.getElementById('progressArea');
  const div = document.createElement('div');
  div.className = 'flex items-center gap-3 bg-white rounded-xl px-4 py-3 shadow-sm text-sm';
  div.innerHTML = `<span class="status-dot bg-yellow-400"></span><span class="flex-1 text-gray-700 truncate">${file.name}</span><span class="text-gray-400">Processing...</span>`;
  area.appendChild(div);

  try {
    const text = await extractText(file);
    addDebug(file.name, text);
    const data = parse(text, file.name);
    allRows.push(...data);
    renderTable();
    div.querySelector('span').style.background = '#22c55e';
    div.querySelector('span:last-child').textContent = `✅ ${data.length} rows extracted`;
  } catch(e) {
    div.querySelector('span').style.background = '#ef4444';
    div.querySelector('span:last-child').textContent = '❌ Parse failed';
    console.error(e);
  }
}

async function extractText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let full = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    full += content.items.map(s => s.str).join(' ') + '\n';
  }
  return full;
}

function parse(text, filename) {
  const t = text.replace(/\s+/g, ' ');

  // --- Plant ---
  const plantMatch = t.match(/plant[:\s#]*([0-9]{3}\s*[0-9]{2}\s+[A-Z][A-Z0-9\s\-]{2,30}?)(?=\s{2,}|,|invoice|date|total|container|\n)/i)
                  || t.match(/(\d{3}\s*\d{2}\s+[A-Z][A-Z]{3,20})/);
  const plant = plantMatch ? plantMatch[1].trim() : extractByLabel(t, 'plant');

  // --- Invoice ---
  const rechnungIdx = t.search(/rechnung\s*\/\s*invoice/i);
  let invoice = '';
  if (rechnungIdx !== -1) {
    const after = t.slice(rechnungIdx, rechnungIdx + 500);
    const nm = after.match(/(\d{6,12})/);
    if (nm) invoice = nm[1];
  }
  if (!invoice) {
    const m2 = t.match(/invoice\s*(?:no\.?|number|#)?[:\s]*(\d{6,12})/i);
    if (m2) invoice = m2[1];
  }

  // --- Date ---
  const dateMatch = t.match(/\b(\d{1,2}[.\/-]\d{1,2}[.\/-]\d{2,4})\b/)
                 || t.match(/\b(\d{4}[.\/-]\d{1,2}[.\/-]\d{1,2})\b/);
  const date = dateMatch ? dateMatch[1] : extractByLabel(t, 'date');

  // --- Route ID: extracted once at file level ---
  const idRe1 = /\b([A-Z]{2,6}\d*-[A-Z0-9]{2,}-[A-Z0-9]{2,}(?:-[A-Z0-9]+)*)\b/;
  const idRe2 = /BL\s*NUMBER\s*[:\s]+\S+\s+([A-Z]{2,5}(?:\s+[A-Z0-9T\*\/]{1,5}){2,}(?:\s+\*+)?)/i;
  const idMatch2 = t.match(idRe2);
  const idMatch1 = t.match(idRe1);
  const routeId = idMatch2 ? idMatch2[1].trim() : (idMatch1 ? idMatch1[1].trim() : '');

  // --- Grand Total + Currency ---
  let grandTotal = '';
  let currency = '';

  const CURR = '(EUR|USD|GBP|CNY|CHF|JPY|CAD|AUD)';
  const AMT  = '([\\d]{1,3}(?:[.,]\\d{3})*[.,]\\d{2})';
  const LABEL = '(?:rechnungsendbetrag|grand\\s*total|total\\s+amount|\\bTOTAL\\b)';

  let gtm = t.match(new RegExp(LABEL + '[^\\d]{0,30}?' + CURR + '[\\s:]*' + AMT, 'i'));
  if (gtm) { currency = gtm[1].toUpperCase(); grandTotal = gtm[2]; }

  if (!grandTotal) {
    gtm = t.match(new RegExp(LABEL + '[^\\d]{0,30}?' + AMT + '\\s*' + CURR, 'i'));
    if (gtm) { grandTotal = gtm[1]; currency = gtm[2].toUpperCase(); }
  }

  if (!grandTotal) {
    gtm = t.match(new RegExp(LABEL + '[:\\s]+' + AMT, 'i'));
    if (gtm) grandTotal = gtm[1];
  }

  if (!currency) currency = extractCurrency(t);

  // --- Price lines ---
  const priceRows = extractPriceLines(t);

  if (priceRows.length === 0) {
    return [{filename, plant, invoice, date, routeId, description:'', unitPrice:'', qty:'', lineTotal:'', currency, grandTotal}];
  }

  return priceRows.map((r, i) => ({
    filename, plant, invoice, date,
    routeId,
    description: r.description,
    unitPrice: r.unitPrice,
    qty: r.qty,
    lineTotal: r.lineTotal,
    currency,
    grandTotal: i === priceRows.length - 1 ? grandTotal : ''
  }));
}

function extractByLabel(t, label) {
  const re = new RegExp(label + '[:\\s#]*([^\\n,]{2,60}?)(?=\\s{2,}|,|\\s[A-Z]{2,}:|$)', 'i');
  const m = t.match(re);
  return m ? m[1].trim() : '';
}

function extractCurrency(t) {
  const m = t.match(/\b(EUR|USD|GBP|CNY|CHF|JPY|CAD|AUD)\b/i)
          || t.match(/currency[:\s]*([A-Z]{3})/i);
  return m ? m[1].toUpperCase() : '';
}

function extractPriceLines(t) {
  const rows = [];

  const re1 = /([A-Z][A-Z0-9 \-\/]{2,60}?)\s{2,}(\d{1,3}(?:[.,]\d{3})*[.,]\d{2})\s+[xX×*]\s*(\d+)\s+(\d{1,3}(?:[.,]\d{3})*[.,]\d{2})/g;
  let m;
  while ((m = re1.exec(t)) !== null) {
    rows.push({ description: m[1].trim(), unitPrice: m[2], qty: m[3], lineTotal: m[4] });
  }

  if (!rows.length) {
    const re2 = /([A-Z][A-Z0-9 \-\/]{2,60}?)\s+(\d[\d.,]*)\s*[*×xX]\s*(\d+)\s*=?\s*(\d[\d.,]*)/g;
    while ((m = re2.exec(t)) !== null) {
      rows.push({ description: m[1].trim(), unitPrice: m[2], qty: m[3], lineTotal: m[4] });
    }
  }

  if (!rows.length) {
    const re3 = /([A-Z][A-Z0-9 \-\/]{2,60}?)\s+(\d+)\s+(\d[\d.,]+)\s+(\d[\d.,]+)/g;
    while ((m = re3.exec(t)) !== null) {
      rows.push({ description: m[1].trim(), unitPrice: m[3], qty: m[2], lineTotal: m[4] });
    }
  }

  return rows;
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  allRows.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.className = i % 2 === 0 ? 'bg-white hover:bg-gray-50' : 'bg-gray-50 hover:bg-gray-100';
    tr.innerHTML = `
      <td class="px-4 py-3 text-gray-500 text-xs max-w-xs truncate" title="${r.filename}">${r.filename}</td>
      <td class="px-4 py-3 font-medium text-gray-800">${r.plant||'—'}</td>
      <td class="px-4 py-3 text-gray-700 whitespace-nowrap">${r.date||'—'}</td>
      <td class="px-4 py-3 font-mono text-xs text-blue-700 whitespace-nowrap">${r.routeId||'—'}</td>
      <td class="px-4 py-3 text-gray-700">${r.description||'—'}</td>
      <td class="px-4 py-3 text-right text-gray-800 font-mono">${r.unitPrice||'—'}</td>
      <td class="px-4 py-3 text-center text-gray-700">${r.qty||'—'}</td>
      <td class="px-4 py-3 text-right font-semibold text-gray-900 font-mono">${r.lineTotal||'—'}</td>
      <td class="px-4 py-3 text-center"><span class="bg-yellow-100 text-yellow-700 rounded px-1.5 text-xs font-mono">${r.currency||'—'}</span></td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('resultsArea').classList.remove('hidden');
  document.getElementById('controls').classList.remove('hidden');
  document.getElementById('resultCount').textContent = `${allRows.length} rows total`;
}

function exportCSV() {
  const headers = ['File','Plant','Date','ID','Description','Unit Price','Qty','Line Total','Currency'];
  const rows = allRows.map(r => [
    r.filename, r.plant, r.date,
    r.routeId, r.description, r.unitPrice, r.qty, r.lineTotal, r.currency
  ].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'invoice_extract.csv'; a.click();
}

function clearAll() {
  allRows = [];
  document.getElementById('tableBody').innerHTML = '';
  document.getElementById('progressArea').innerHTML = '';
  document.getElementById('progressArea').classList.add('hidden');
  document.getElementById('resultsArea').classList.add('hidden');
  document.getElementById('controls').classList.add('hidden');
  document.getElementById('debugArea').innerHTML = '';
  fileInput.value = '';
}

function addDebug(name, text) {
  const area = document.getElementById('debugArea');
  const div = document.createElement('details');
  div.className = 'bg-white rounded-xl shadow-sm text-xs';
  div.innerHTML = `<summary class="px-4 py-2 cursor-pointer text-gray-500 hover:text-gray-700">🔍 Raw text: ${name}</summary><pre class="px-4 pb-3 text-gray-400 whitespace-pre-wrap overflow-x-auto max-h-48">${text.substring(0,3000)}</pre>`;
  area.appendChild(div);
}
</script>
</body>
</html>
